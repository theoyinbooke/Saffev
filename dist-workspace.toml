[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax)
# v0.1.2 adds ARM-Linux + Windows to the original three (macOS both arches +
# Linux x86_64). The unix-only daemon/attribution/signal code is now cfg-gated for
# Windows (see src/cli/daemon.rs, src/attribution.rs, src/cli/commands.rs).
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
]
# Path-style install: drop the binary on PATH (no extra prompts).
install-path = "CARGO_HOME"
# Write the install receipt the in-app updater (axoupdater) reads to find the
# current install + its release source, and ship a standalone updater alongside
# the binary. This is what powers `saffev update` and the Studio "Update" button.
# PRIVACY: the receipt is a local file; the updater only ever contacts GitHub
# release metadata — no user/content data ever leaves the device.
install-updater = true

# --- macOS code-signing + notarization (gated on Apple secrets) ---
#
# Native dist code-signing of the macOS binaries. dist sets up an ephemeral
# keychain on the macOS runner, imports the Developer ID Application cert from the
# CODESIGN_CERTIFICATE / CODESIGN_CERTIFICATE_PASSWORD secrets, and runs
# `codesign --sign "$CODESIGN_IDENTITY"` on each binary *before* it is tarred and
# checksummed — so the published archive and the checksums baked into the shell
# installer are computed over the SIGNED binary. Required secrets the generated
# workflow reads: CODESIGN_CERTIFICATE, CODESIGN_CERTIFICATE_PASSWORD,
# CODESIGN_IDENTITY (see README "Releasing / macOS signing").
#
# This is gated: with the secrets absent, dist's signer no-ops (it only signs
# when all three env vars are present) — releases keep working unsigned. Add the
# secrets to turn signing on. fail-open extends to the release pipeline.
macos-sign = true
# Inject a pre-build step that exports CODESIGN_OPTIONS=runtime on macOS runners,
# so dist's `codesign` call uses the HARDENED RUNTIME (an Apple notarization
# prerequisite). The fragment lives at .github/build-setup.yml; dist re-injects
# it on every `dist generate`, so it is not clobbered. Path is relative to
# .github/workflows/.
github-build-setup = "../build-setup.yml"
# Notarization runs as a custom post-announce job (.github/workflows/notarize-macos.yml).
# A bare CLI Mach-O binary cannot be stapled, so we notarize a zip of the signed
# binary with `xcrun notarytool submit --wait` AFTER the release is published, and
# Gatekeeper verifies the ticket online. This job does NOT re-tar or re-upload any
# archive (that would break the installer's embedded checksums); it is read-only
# against the release. It no-ops unless the Apple API-key secrets are present.
post-announce-jobs = ["./notarize-macos"]

# --- per-target CI runners ---
#
# Build aarch64-unknown-linux-gnu on a NATIVE ARM runner rather than dist's
# default zig cross-compile. Rationale: the `sqlcipher` feature (ON by default)
# links **bundled SQLCipher**, which compiles C, and `axoupdater` pulls in
# `aws-lc-sys` (also C). Building that C natively on an ARM host sidesteps the
# cross-C toolchain pitfalls (sysroot / headers / linker) that bite zig-cross C
# builds. GitHub's `ubuntu-22.04-arm` runner is GA for public repos, so this needs
# no paid runners. The other four targets keep their dist defaults (macOS arches on
# macOS runners, x86_64 Linux on ubuntu-22.04, Windows on a windows runner — all
# native, so their C deps compile natively too).
#
# NB: this is a TOML sub-table of [dist]; it MUST stay at the end of the file,
# after every bare [dist] key, or those keys would bind to this table instead.
[dist.github-custom-runners]
aarch64-unknown-linux-gnu = "ubuntu-22.04-arm"
