[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax)
# Scoped to the reference platforms for v0.1.0: macOS (both arches) + Linux x86_64.
# ARM-Linux and Windows are deferred (Windows: unix-specific daemon/attribution code).
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
# Path-style install: drop the binary on PATH (no extra prompts).
install-path = "CARGO_HOME"
# Write the install receipt the in-app updater (axoupdater) reads to find the
# current install + its release source, and ship a standalone updater alongside
# the binary. This is what powers `saffev update` and the Studio "Update" button.
# PRIVACY: the receipt is a local file; the updater only ever contacts GitHub
# release metadata — no user/content data ever leaves the device.
install-updater = true
